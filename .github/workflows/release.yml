name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dev dependencies
        run: uv sync --dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format (check only)
        run: uv run ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dev dependencies
        run: uv sync --dev

      - name: ty check
        run: uv run ty check src/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install project + dev dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v

  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install project + dev dependencies
        run: uv sync --dev

      - name: Run functional tests
        run: uv run pytest tests/functional/ -v

  docs-check:
    name: Docs Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install project dependencies
        run: uv sync

      - name: Regenerate README
        run: uv run markproof generate .

      - name: Validate README
        run: uv run markproof check README.md --root .

      - name: Validate docs library
        run: |
          for doc in docs/*.md; do
            uv run markproof check "$doc" --root docs/
          done

  build:
    name: Build
    needs: [lint, type-check, unit-tests, functional-tests, docs-check]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Build wheel and sdist
        run: uv build

      - name: Verify tag matches built package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(uv run python -c "import markproof; print(markproof.__version__)")
          echo "Tag version    : $TAG"
          echo "Package version: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "ERROR: tag $TAG does not match package version $PKG"
            exit 1
          fi

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  test-action:
    name: Test GitHub Action
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install built wheel
        run: pip install dist/*.whl -q

      - name: Test action — check only
        uses: ./
        with:
          dev: 'true'
          generate: 'false'
          path: README.md
          root: .

      - name: Test action — generate then check
        uses: ./
        with:
          dev: 'true'
          generate: 'true'
          path: README.md
          root: .

  publish-pypi:
    name: Publish to PyPI
    needs: [build, test-action]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/markproof
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release
    needs: [build, test-action]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
